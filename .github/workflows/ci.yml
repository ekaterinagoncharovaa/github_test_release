name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install allurectl
        run: |
          curl -fsSL https://github.com/allure-framework/allurectl/releases/download/2.18.0/allurectl_linux_amd64 -o allurectl
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/allurectl
          allurectl --version

      - name: Run tests
        run: uv run --with pytest pytest test_operations.py -v
